version: '3.8'

services:
  management-app:
    build:
      context: ./management
      dockerfile: Dockerfile
    image: cooyue-management:latest
    container_name: cooyue-management-app
    restart: unless-stopped
    ports:
      - "3003:3003"
    depends_on:
      - server
    networks:
      - cooyue-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  next-app:
    build:
      context: ./next
      dockerfile: docker/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://43.139.70.61:3001}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://cooyue.com}
    image: cooyue-next:latest
    container_name: cooyue-next-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://43.139.70.61:3001}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-https://cooyue.com}
    networks:
      - cooyue-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  server:
    build:
      context: ./server
      dockerfile: docker/Dockerfile
    image: cooyue-server:latest
    container_name: cooyue-server-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      - NODE_ENV=production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cooyue-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  cooyue-network:
    driver: bridge

volumes:
  webhook-logs:
