version: '3.8'

services:
  next-app:
    build:
      context: ./next
      dockerfile: docker/Dockerfile
    image: cooyue-next:latest
    container_name: cooyue-next-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - cooyue-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  cooyue-network:
    driver: bridge

volumes:
  webhook-logs:
